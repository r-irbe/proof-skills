id: lean-applied-reasoning-smoke
ensemble_rubric: lean-proof-quality  # Round 21 A1: rewrote prompt to demand Lean 4 syntax
title: "Investigative reasoning step (Lean 4 structure)"
skill: lean-applied-reasoning
difficulty: easy
input:
  prompt: |
    Write a Lean 4 `structure InfRule` for one inferential step in an evidence-chain.
    Fields: `premises : List Evidence`, `conclusion : Hypothesis`, `weight : EvidenceWeight`.
    Reply with the Lean 4 code only — no prose.
  expected_output_substring: |
    structure InfRule where
      premises : List Evidence
      conclusion : Hypothesis
      weight : EvidenceWeight
expected:
  contains:
    - "structure\\s+InfRule"
    - "premises"
    - "conclusion"
    - "weight"
  not_contains:
    - "sorry"
    - "admit"
grader: deterministic
tags: [lean, applied, investigation]
