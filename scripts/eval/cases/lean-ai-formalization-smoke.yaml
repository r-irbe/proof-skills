id: lean-ai-formalization-smoke
ensemble_rubric: lean-proof-quality  # Round 21 A1: rewrote prompt to demand Lean 4 syntax
title: "Reward-hacking formal property (Lean 4)"
skill: lean-ai-formalization
difficulty: easy
input:
  prompt: |
    Write a Lean 4 `def` named `NoNoOpHack` for the property "a reward function R must not be
    strictly higher on a no-op action than a baseline". Use signature
    `(R : Action → ℝ) (isNoOp : Action → Prop) (Rbaseline : ℝ) : Prop`. Reply with the
    Lean 4 code only — no prose.
  expected_output_substring: |
    def NoNoOpHack (R : Action → ℝ) (isNoOp : Action → Prop) (Rbaseline : ℝ) : Prop :=
      ∀ a, isNoOp a → R a ≤ Rbaseline
expected:
  contains:
    - "def\\s+NoNoOpHack"
    - "isNoOp"
    - "Rbaseline"
  not_contains:
    - "sorry"
    - "admit"
grader: deterministic
tags: [lean, ai, reward]
