id: lean-causal-reasoning-smoke
ensemble_rubric: lean-proof-quality  # Round 21 A1: rewrote prompt to demand Lean 4 syntax
title: "Causal vs correlational claim (Lean 4 def)"
skill: lean-causal-reasoning
difficulty: easy
input:
  prompt: |
    Write a Lean 4 `def Causes` for a causal relation `Causes (X Y : Prop) : Prop` distinct from
    biconditional `↔`. Reply with the Lean 4 code only — no prose. Include a comment line that
    states why `Causes X Y` is NOT the same as `X ↔ Y`.
  expected_output_substring: |
    -- Causal relation: a primitive distinct from correlation (which is `↔`).
    -- Causes X Y means "X is a cause of Y" under intervention semantics.
    def Causes (X Y : Prop) : Prop := ∀ (interv : Prop), interv → X → Y
expected:
  contains:
    - "def\\s+Causes"
    - "Prop"
    - "intervention|interv"
  not_contains:
    - "sorry"
    - "admit"
grader: deterministic
tags: [lean, causal]
