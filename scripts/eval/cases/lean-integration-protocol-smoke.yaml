id: lean-integration-protocol-smoke
ensemble_rubric: lean-proof-quality  # Round 21 A1: rewrote prompt to demand Lean 4 syntax
title: "Cross-module bridge contract (Lean 4 structure)"
skill: lean-integration-protocol
difficulty: easy
input:
  prompt: |
    Write a Lean 4 `structure BridgeContract` for an integration surface between two modules.
    Fields: `source : String` (e.g. "MeasureBridge"), `target : String` (e.g. "Information"),
    `exported : List String` (lemma names), `validator : Unit → Bool`. Reply with code only.
  expected_output_substring: |
    structure BridgeContract where
      source : String
      target : String
      exported : List String
      validator : Unit → Bool
expected:
  contains:
    - "structure\\s+BridgeContract"
    - "exported"
    - "validator"
  not_contains:
    - "sorry"
    - "admit"
grader: deterministic
tags: [lean, integration]
