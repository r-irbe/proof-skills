id: lean-build-smoke
ensemble_rubric: applied-domain-quality  # Round 21 A1: process/workflow, not Lean code
title: "Targeted Lake build with cache"
skill: lean-build
difficulty: easy
input:
  prompt: |
    Build a single Mathlib module after a clean state.
  expected_output_substring: |
    Run `lake exe cache get` then `lake build Mathlib.Algebra.Group.Basic -q --log-level=info`.
expected:
  contains:
    - "lake exe cache get"
    - "lake build"
    - "-q"
  not_contains:
    - "sorry"
    - "admit"
grader: deterministic
tags: [lean, lake, build]
