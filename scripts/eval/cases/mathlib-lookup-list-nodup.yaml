id: mathlib-lookup-list-nodup
title: "Identify Mathlib lemma about List.Nodup append"
skill: mathlib-lookup
ensemble_rubric: mathlib-lookup-quality
difficulty: medium
input:
  prompt: |
    Name the Mathlib lemma stating that `(l₁ ++ l₂).Nodup` iff both
    lists are Nodup AND they are disjoint. Show the type signature.
  expected_output_substring: |
    theorem List.nodup_append {l₁ l₂ : List α} :
        (l₁ ++ l₂).Nodup ↔ l₁.Nodup ∧ l₂.Nodup ∧ l₁.Disjoint l₂
expected:
  contains:
    - "List\\.nodup_append"
    - "List\\s+α"
    - "Nodup"
    - "Disjoint"
    - "↔"
  not_contains:
    - "sorry"
    - "List\\.nodupAppend\\b"
grader: deterministic
tags: [lean, mathlib, lookup, list, nodup]
