id: lean-nested-learning-smoke
ensemble_rubric: lean-proof-quality  # Round 21 A1: rewrote prompt to demand Lean 4 syntax
title: "Nested learner protocol (Lean 4 structure)"
skill: lean-nested-learning
difficulty: easy
input:
  prompt: |
    Write a Lean 4 `structure MetaLearner` parameterised by an inner-learner type. Fields:
    `inner : InnerLearner θ`, `metaStep : θ → θ`. Use `θ` as an implicit type parameter.
    Reply with code only.
  expected_output_substring: |
    structure MetaLearner (θ : Type) where
      inner : InnerLearner θ
      metaStep : θ → θ
expected:
  contains:
    - "structure\\s+MetaLearner"
    - "inner"
    - "metaStep"
  not_contains:
    - "sorry"
    - "admit"
grader: deterministic
tags: [lean, nested, learning]
