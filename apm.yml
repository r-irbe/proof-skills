# --------------------------------------------------------------------
# apm.yml — Agent Package Manager manifest (microsoft/apm)
# --------------------------------------------------------------------
# This file makes `proof-skills` installable with one command in any
# project that uses APM:
#
#   apm install r-irbe/proof-skills                       # entire bundle
#   apm install r-irbe/proof-skills --skill lean-proof    # single skill
#   apm install r-irbe/proof-skills#v0.1.0                # version-pinned
#
# Package layout: SKILL COLLECTION
# (per https://microsoft.github.io/apm/reference/package-types/
#  — "skills/<name>/SKILL.md" — many independent skills in one repo.)
#
# APM auto-discovers every `skills/<name>/SKILL.md`; no skill list is
# required here. A consumer's `--skill X` selection is persisted into
# THEIR apm.yml + apm.lock.yaml, not this file.
# --------------------------------------------------------------------

name: proof-skills
version: 0.1.0
description: |
  Lean 4 / Mathlib4 agent-skill toolkit — proof tactics, math-domain
  workflows, doc/review/research patterns, zettelkasten, and generic
  tooling. Project-agnostic; instantiable via `<Project>` placeholders.

author: r-irbe
license: Apache-2.0

# Pointers a registry / `apm view` will surface.
keywords:
  - lean4
  - mathlib4
  - agent-skills
  - formal-verification
  - proof-engineering
  - zettelkasten

repository:
  type: git
  url: https://github.com/r-irbe/proof-skills

homepage: https://github.com/r-irbe/proof-skills
issues: https://github.com/r-irbe/proof-skills/issues

# Auto-detect harnesses on the consumer side. Uncomment to force a
# specific target on every install:
# targets:
#   - copilot
#   - claude
#   - cursor
#   - opencode
#   - codex
#   - gemini
#   - windsurf

# This repo authors skills directly; no transitive APM dependencies.
# The vendored upstream `leanprover/skills` lives under
# `vendor/leanprover-skills/` as a plain git submodule (read-only,
# referenced by `skills/_overrides/<X>/`), NOT as an APM dep — APM
# would re-publish those skills, but the override layer needs them
# verbatim. Convert to apm-dep once upstream ships `apm.yml`.
dependencies:
  apm: []
  mcp: []

# Ship any in-repo `.apm/` content the author drops in later (none
# today). The skill-collection layout under `skills/` is hoisted
# automatically by APM regardless of this setting.
includes: auto

# Convenience scripts a consumer can run via `apm run <name>`
# (experimental in APM 0.x). All scripts are read-only / non-mutating
# and safe under the §1.4 autopilot belief floor.
scripts:
  lint-zk: python3 scripts/lean/zettelkasten_lint.py --zk-root zettelkasten --strict
  audit-axioms: python3 scripts/lean/axiom_audit.py --help
  templates-list: ls -1 templates/Template_*.md
  skills-count: bash -c 'find skills -maxdepth 2 -name SKILL.md -not -path "*_overrides*" | wc -l'
