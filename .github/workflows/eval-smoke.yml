name: eval-smoke

# Minimal subset of the design in lab/design/01-eval-framework.md §8.2.
# Smoke variant of the eval framework: deterministic grader + Glicko-2
# math + LLM-judge grader replay (no API calls) + ADR-0039 known-bad
# judge-calibration gate.
#
# Hard-gates the PR if any previously-passing case starts failing,
# or if any case's score drops below its baseline value.
#
# W8 Phase 1 + 2 (deterministic + baseline + LLM judge via offline
# capture) and W9 Phase 1 (Glicko-2) are CI-green.
# Live LLM dispatch (W8 Phase 3 / W9 Phase 2) happens offline via
# scripts/eval/graders/DISPATCH.md flavour A (Copilot CLI sub-agent
# fleet — see scripts/eval/judge_runs/ + scripts/elo/matches/ for
# captured artifacts). Flavour B (Anthropic SDK) remains API-budget
# gated per MASTER-PLAN.md §4.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke:
    name: Deterministic eval suite (baseline gate)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PyYAML (runner uses fallback parser without it)
        run: python -m pip install --upgrade pip pyyaml

      - name: Run deterministic eval suite
        run: |
          python3 scripts/eval/run_eval.py \
            --cases 'scripts/eval/cases/*.yaml' \
            --out ./_eval-out \
            --grader deterministic

      - name: Diff against committed baseline
        run: |
          python3 scripts/eval/baseline.py \
            --run-dir ./_eval-out \
            --baseline scripts/eval/baselines/smoke/baseline.json \
            --mode diff

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-smoke-report
          path: ./_eval-out/
          if-no-files-found: warn
          retention-days: 30

  glicko2:
    name: Glicko-2 sanity tests (Glickman 2012 §5)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run Glicko-2 sanity tests
        run: python3 scripts/elo/glicko2_test.py

      - name: Smoke-run Glicko-2 on sample_matches.csv
        run: |
          python3 scripts/elo/glicko2.py \
            --matches scripts/elo/sample_matches.csv \
            --out ./_glicko2-out

      - name: Smoke-run Glicko-2 on live matches CSVs (if any)
        run: |
          shopt -s nullglob
          for f in scripts/elo/matches/*.csv; do
            echo "::group::Glicko-2 on $f"
            python3 scripts/elo/glicko2.py --matches "$f" --out "./_glicko2-live-$(basename "$f" .csv)"
            echo "::endgroup::"
          done
        shell: bash

      - name: Upload Glicko-2 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: glicko2-report
          path: ./_glicko2-out/
          if-no-files-found: warn
          retention-days: 30

  llm-judge-grader:
    name: LLM-judge grader replay (no API calls)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: python -m pip install --upgrade pip pyyaml

      - name: Replay LLM-judge grader on stored judge replies
        # Hard-gates the grader logic against the committed judge
        # responses. No API call — judge JSON files were captured
        # offline via scripts/eval/graders/DISPATCH.md flavour A
        # (Copilot CLI sub-agent).
        run: |
          shopt -s nullglob
          for case_dir in scripts/eval/judge_runs/*/; do
            case_name=$(basename "$case_dir")
            response_file="$case_dir/response.txt"
            # Multi-model cases have output-<id>.lean instead of response.txt;
            # skip the grade step for those (multi_model.py handles them).
            if [ ! -f "$response_file" ]; then
              echo "Skipping $case_name (multi-model case)"
              continue
            fi
            replies=()
            for j in "$case_dir"judge-*.json; do
              replies+=( --judge-reply "$j" )
            done
            if [ ${#replies[@]} -eq 0 ]; then
              echo "Skipping $case_name (no judge replies)"
              continue
            fi
            case_yaml="scripts/eval/cases/$case_name.yaml"
            if [ ! -f "$case_yaml" ]; then
              echo "Skipping $case_name (no case YAML at $case_yaml)"
              continue
            fi
            echo "::group::Grade $case_name"
            # Allow non-zero exit (we expect some cases to fail by design)
            python3 scripts/eval/graders/llm_judge.py grade \
              --case "$case_yaml" \
              --rubric scripts/eval/graders/rubrics/lean-proof-quality.yaml \
              --response "$response_file" \
              "${replies[@]}" \
              --out "$case_dir/grade.json" || true
            echo "::endgroup::"
          done

      - name: Replay multi_model.py on judge_runs/ (no API calls)
        run: |
          shopt -s nullglob
          mkdir -p ./_multi-model-out
          for case_dir in scripts/eval/judge_runs/*/; do
            case_name=$(basename "$case_dir")
            # Multi-model cases are detected by presence of output-*.lean
            if compgen -G "$case_dir/output-*.lean" > /dev/null; then
              echo "::group::multi_model.py on $case_name"
              python3 scripts/eval/multi_model.py \
                --runs-dir scripts/eval/judge_runs \
                --case "$case_name" \
                --rubric scripts/eval/graders/rubrics/lean-proof-quality.yaml \
                --out "./_multi-model-out/$case_name.csv"
              echo "::endgroup::"
            fi
          done

  judge-calibration:
    name: LLM-judge calibration gate (ADR-0039 ≥90% recall)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        include:
          - rubric: lean-proof-quality
            skill_dir: lean-proof
            min_flag_rate: "0.90"
            # Only lean-proof has an adversarial-positive sub-corpus today;
            # the 20% ceiling reflects the 2026-05-27 baseline (1/5 cases
            # falsely flagged because sonnet-4.6 over-fires on the literal
            # `decide` token without honouring the rubric's "as-search"
            # qualifier). Loosening re-arms the gate; tightening requires
            # rubric clarification or fleet rebalancing.
            max_false_flag_rate: "0.20"
          - rubric: lean-setup-import-quality
            skill_dir: lean-setup-import
            min_flag_rate: "0.90"
            # No adversarial positives yet — gate disabled (1.00 = no-op).
            max_false_flag_rate: "1.00"
          - rubric: mathlib-lookup-quality
            skill_dir: mathlib-lookup
            min_flag_rate: "0.90"
            max_false_flag_rate: "1.00"
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: python -m pip install --upgrade pip pyyaml

      - name: Replay calibrate_judge for ${{ matrix.rubric }}
        # Per lab/design/01-eval-framework.md §4.2 and ADR-0039: the
        # judge ensemble must flag ≥90% of known-bad transcripts as ≤2
        # (recall floor). Where adversarial known-good transcripts exist,
        # an additional false-flag ceiling guards against keyword-matching
        # over-firing.
        run: |
          python3 scripts/eval/calibrate_judge.py check \
            --rubric scripts/eval/graders/rubrics/${{ matrix.rubric }}.yaml \
            --skill-dir lab/evals/known-bad/${{ matrix.skill_dir }} \
            --label ensemble-ci \
            --min-flag-rate ${{ matrix.min_flag_rate }} \
            --max-false-flag-rate ${{ matrix.max_false_flag_rate }}

      - name: Upload calibration report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: judge-calibration-report-${{ matrix.rubric }}
          path: ./reports/_calibration/
          if-no-files-found: warn
          retention-days: 30
